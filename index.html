<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Daily Report</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
label { font-weight: bold; }
input, select { margin-bottom: 10px; width: 100%; padding: 5px; }
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: center;
}
#alertExcel {
    background-color: #ffcccc;
    color: #990000;
    border: 2px solid #990000;
    padding: 15px;
    font-size: 18px;
    text-align: center;
    margin: 15px 0;
    font-weight: bold;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>Driver Daily Report</h2>

<!-- Daily Info -->
<label>Vehicle:</label>
<input type="text" id="vehicle" placeholder="Enter Vehicle Number" required>

<label>Run:</label>
<input type="number" id="run" required>

<label>Date:</label>
<input type="date" id="date" required>

<hr>

<!-- Collection / Delivery -->
<label>Collection and Delivery Point:</label>
<select id="location" onchange="checkManual()">
    <option value="">Select location</option>
    <option>AC</option>
    <option>ASC</option>
    <option>BA WC</option>
    <option>BA WC 2nd</option>
    <option>Ba XPS</option>
    <option>DAI</option>
    <option>Dnata CP</option>
    <option>Dnata CX</option>
    <option>Dnata U1</option>
    <option>Dnata U2</option>
    <option>Dnata U3</option>
    <option>Dnata VS/Delta</option>
    <option>HCH</option>
    <option>HCH Horton</option>
    <option>JL</option>
    <option>MW</option>
    <option>Scylla Rd</option>
    <option>Scylla U1</option>
    <option>WFS 549</option>
    <option>WFS 550</option>
    <option>ECMS</option>
    <option>Swissport</option>
    <option>BREAK</option>
    <option value="manual">Other (Manual Entry)</option>
</select>
<input type="text" id="manualLocation" placeholder="Enter location manually" style="display:none; margin-bottom:10px;">

<label>Booking Time:</label>
<input type="time" id="booking">

<label>Arrival Time:</label>
<input type="time" id="arrival">

<label>Loading:</label>
<input type="time" id="loading">

<label>Departure:</label>
<input type="time" id="departure">

<label>Comment:</label>
<input type="text" id="comment">

<button onclick="addEntry()">Add Location</button>

<!-- Alert for Excel generation -->
<div id="alertExcel">
⚠️ <strong>Important:</strong> After adding all locations, make sure to click <strong>Generate Excel</strong> to save your daily report locally! ⚠️
</div>

<button onclick="generateExcel()">Generate Excel</button>

<!-- Table -->
<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Collection and Delivery Point</th>
<th>Booking Time</th>
<th>Arrival Time</th>
<th>Loading</th>
<th>Departure</th>
<th>Comment</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const entries = [];

function checkManual() {
    const loc = document.getElementById("location").value;
    document.getElementById("manualLocation").style.display = loc === "manual" ? "block" : "none";
}

function addEntry() {
    const vehicle = document.getElementById("vehicle").value;
    const run = document.getElementById("run").value;
    const date = document.getElementById("date").value;
    const locationSelect = document.getElementById("location").value;
    const location = locationSelect === "manual" ? document.getElementById("manualLocation").value : locationSelect;
    const booking = document.getElementById("booking").value;
    const arrival = document.getElementById("arrival").value;
    const loading = document.getElementById("loading").value;
    const departure = document.getElementById("departure").value;
    const comment = document.getElementById("comment").value;

    if(!vehicle || !run || !date || !location){
        alert("Please fill all required fields!");
        return;
    }

    const entry = { date, vehicle, run, location, booking, arrival, loading, departure, comment };
    entries.push(entry);

    // Add row to table
    const table = document.getElementById("reportTable").getElementsByTagName('tbody')[0];
    const row = table.insertRow();
    row.insertCell(0).innerHTML = date;
    row.insertCell(1).innerHTML = vehicle;
    row.insertCell(2).innerHTML = run;
    row.insertCell(3).innerHTML = location;
    row.insertCell(4).innerHTML = booking;
    row.insertCell(5).innerHTML = arrival;
    row.insertCell(6).innerHTML = loading;
    row.insertCell(7).innerHTML = departure;
    row.insertCell(8).innerHTML = comment;

    // Send to Google Sheets
    sendToGoogleSheets(entry);

    // Clear input fields for next entry
    document.getElementById("location").value = "";
    document.getElementById("manualLocation").value = "";
    document.getElementById("manualLocation").style.display = "none";
    document.getElementById("booking").value = "";
    document.getElementById("arrival").value = "";
    document.getElementById("loading").value = "";
    document.getElementById("departure").value = "";
    document.getElementById("comment").value = "";
}

// Excel generation
function generateExcel() {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(entries);
    XLSX.utils.book_append_sheet(wb, ws, "DailyReport");
    XLSX.writeFile(wb, "DriverDailyReport.xlsx");
}

// Google Sheets integration
async function sendToGoogleSheets(data) {
    const url = "PASTE_YOUR_WEB_APP_URL_HERE"; // <--- pune aici URL-ul Web App de la Apps Script
    try {
        await fetch(url, {
            method: "POST",
            body: JSON.stringify(data)
        });
    } catch(e) {
        console.error("Error sending to Google Sheets:", e);
    }
}
</script>

</body>
</html>
